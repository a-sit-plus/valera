name: Publish iOS App
on: workflow_dispatch
jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - name: Common setup
        uses: a-sit-plus/internal-workflows/.github/actions/common-setup@v2
      - name: Set up Ruby gems
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
        env:
          BUNDLE_GEMFILE: ${{ github.workspace }}/iosApp/Gemfile
      - name: Prepare files from secrets
        run: |
          echo "${{ secrets.APPLE_CERT_CONTENT }}" > iosApp/cert.b64
          base64 -d -i iosApp/cert.b64 > iosApp/cert.p12
      - name: Upload to testflight
        run: bundle exec fastlane deploy
        working-directory: iosApp
        env:
          APP_BUNDLE_IDENTIFIER: at.asitplus.wallet.compose
          FASTLANE_OPT_OUT_USAGE: true
          FASTLANE_XCODE_LIST_TIMEOUT: 120
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          SIGNING_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
          SIGNING_RELEASE_PROVISIONING_PROFILE_SPECIFIER: Compose Wallet Distribution
          CI: true
      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: xcode.log
          path: "/Users/runner/Library/Logs/gym/Valera-iosApp.log"
