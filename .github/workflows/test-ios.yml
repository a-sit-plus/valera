name: Test iOS
on: [push]
jobs:
  build:
    runs-on: macos-16
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 26.3
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Cache gradle files
        uses: actions/cache@v4
        env:
          cache-name: cache-gradle
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.m2/repository
          key: iOS-${{ hashFiles('./gradle/libs.versions.toml', './gradle.properties', './gradle/wrapper/gradle-wrapper.properties') }}
      - name: Build iOS App for Simulator
        run: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            build | tee /tmp/iosApp-simulator-build.log
      - name: Upload logs (Build iOS App)
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: xcode.log
          path: /tmp/iosApp-simulator-build.log
      - name: Test KMP on iOS
        run: ./gradlew -U :shared:iosSimulatorArm64Test
      - name: Test Report from KMP on iOS
        uses: dorny/test-reporter@v2
        if: success() || failure()
        with:
          name: Shared tests
          path: shared/build/test-results/**/TEST*.xml
          reporter: java-junit
          list-suites: failed
          list-tests: failed
          use-actions-summary: true
